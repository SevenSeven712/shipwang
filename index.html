<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>七七视频网</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        /* ==================== 全局设计 ==================== */
        :root {
            --bg: #f0f2f8;
            --surface: #ffffff;
            --surface-hover: #f5f7fc;
            --surface-el: #ffffff;
            --accent: #ffb800;
            --accent-dim: rgba(255, 184, 0, 0.15);
            --accent-glow: rgba(255, 184, 0, 0.3);
            --text: #1e1e2a;
            --text2: #4a4d66;
            --text3: #8a8da8;
            --border: rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
            --header-h: 56px;
            --bottom-h: 60px;
            --sidebar-w: 200px;
            --radius: 10px;
            --radius-lg: 14px;
            --font-d: 'Syne', sans-serif;
            --font-m: 'DM Mono', monospace;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: var(--font-m);
            font-size: 13px;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            padding-bottom: var(--bottom-h);
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
        }
        img {
            display: block;
            max-width: 100%;
        }
        input,
        textarea,
        select {
            font-family: inherit;
            font-size: inherit;
            color: inherit;
        }
        ::selection {
            background: var(--accent);
            color: #fff;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text3);
            border-radius: 3px;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 9999;
        }

        /* ==================== 启动页 ==================== */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.6s ease;
            font-family: var(--font-d);
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #splash .logo {
            font-size: 36px;
            font-weight: 800;
            color: #1e1e2a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #splash .logo .dot {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
        }
        #splash .loader {
            margin-top: 24px;
            width: 40px;
            height: 40px;
            border: 4px solid #e8eaef;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ==================== 启动弹窗 ==================== */
        .welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .welcome-modal.show {
            opacity: 1;
            pointer-events: all;
        }
        .welcome-modal .box {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 32px 28px 28px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
            transform: scale(0.95) translateY(20px);
            transition: transform 0.3s ease;
        }
        .welcome-modal.show .box {
            transform: scale(1) translateY(0);
        }
        .welcome-modal .box .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .welcome-modal .box h2 {
            font-family: var(--font-d);
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .welcome-modal .box p {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .welcome-modal .box .btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .welcome-modal .box .btns button {
            padding: 10px 28px;
            border-radius: 24px;
            font-family: var(--font-d);
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .welcome-modal .box .btns .btn-primary {
            background: var(--accent);
            color: #1e1e2a;
        }
        .welcome-modal .box .btns .btn-primary:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.02);
        }
        .welcome-modal .box .btns .btn-secondary {
            background: var(--surface-hover);
            color: var(--text2);
            border: 1px solid var(--border);
        }
        .welcome-modal .box .btns .btn-secondary:hover {
            background: var(--border);
        }

        /* ==================== 顶部导航 ==================== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
            gap: 16px;
        }

        .header-logo {
            font-family: var(--font-d);
            font-size: 20px;
            font-weight: 800;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex-shrink: 0;
            color: var(--text);
        }
        .header-logo .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }

        .header-search {
            flex: 1;
            max-width: 420px;
            position: relative;
        }
        .header-search input {
            width: 100%;
            height: 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 0 14px 0 36px;
            color: var(--text);
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
        }
        .header-search input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }
        .header-search input::placeholder {
            color: var(--text3);
        }
        .header-search .si {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
            width: 15px;
            height: 15px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
            flex-shrink: 0;
        }

        /* ==================== PC 侧边栏 ==================== */
        .sidebar {
            position: fixed;
            top: var(--header-h);
            left: 0;
            bottom: 0;
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 12px 0;
            overflow-y: auto;
            z-index: 900;
            display: none;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.04);
        }
        @media (min-width: 1024px) {
            .sidebar {
                display: block;
            }
            body {
                padding-bottom: 0;
            }
        }
        .sb-sec {
            padding: 0 8px;
            margin-bottom: 20px;
        }
        .sb-title {
            font-family: var(--font-d);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text3);
            padding: 0 10px;
            margin-bottom: 6px;
        }
        .sb-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: var(--radius);
            font-size: 12px;
            color: var(--text2);
            transition: all 0.15s;
            cursor: pointer;
        }
        .sb-item:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        .sb-item.active {
            background: var(--accent-dim);
            color: var(--accent);
        }
        .sb-item svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
        }

        /* ==================== 底部导航 (移动端) ==================== */
        .btm-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--bottom-h);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
            display: none;
        }
        @media (max-width: 1023px) {
            .btm-nav {
                display: flex;
            }
        }
        .btm-nav.hidden {
            display: none;
        }
        .bni {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            color: var(--text3);
            transition: color 0.2s;
            padding: 4px 12px;
            cursor: pointer;
        }
        .bni.active {
            color: var(--accent);
        }
        .bni svg {
            width: 22px;
            height: 22px;
        }

        /* ==================== 主内容 ==================== */
        .main {
            margin-top: var(--header-h);
            min-height: calc(100vh - var(--header-h) - var(--bottom-h));
        }
        .page {
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 通用返回按钮 ==================== */
        .back-btn {
            position: fixed;
            top: calc(var(--header-h) + 12px);
            left: 16px;
            z-index: 100;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: var(--surface-hover);
        }
        .back-btn svg {
            width: 20px;
            height: 20px;
            color: var(--text);
        }

        /* ==================== 个人主页 ==================== */
        .pp-banner {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #1a1030, #0d2040 50%, #0a1520);
            position: relative;
        }
        .pp-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, var(--bg));
        }
        .pp-hdr {
            padding: 0 16px;
            margin-top: -36px;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: flex-end;
            gap: 14px;
            margin-bottom: 14px;
        }
        .pp-av-wrap {
            flex-shrink: 0;
        }
        .pp-av {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg);
        }
        .pp-info {
            flex: 1;
            padding-bottom: 4px;
        }
        .pp-name {
            font-family: var(--font-d);
            font-size: 20px;
            font-weight: 800;
        }
        .pp-handle {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .pp-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 0 8px;
            border-radius: 12px;
            color: #fff;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.2);
            line-height: 20px;
            vertical-align: middle;
            white-space: nowrap;
        }
        .pp-badge.gold {
            background: #ffb800;
            color: #fff;
        }
        .pp-badge.blue {
            background: #3b8cff;
            color: #fff;
        }
        .pp-badge.white {
            background: #b0b0b0;
            color: #fff;
        }

        .pp-bio {
            padding: 0 16px 14px;
            font-size: 12px;
            color: var(--text2);
            line-height: 1.6;
            margin-top: 6px;
        }
        .pp-stats {
            display: flex;
            gap: 20px;
            padding: 0 16px 16px;
        }
        .pp-stat {
            text-align: center;
        }
        .pp-stat-n {
            font-family: var(--font-d);
            font-size: 17px;
            font-weight: 800;
        }
        .pp-stat-l {
            font-size: 10px;
            color: var(--text2);
        }
        .pp-vids {
            padding: 0 16px 20px;
        }
        .pp-vids-t {
            font-family: var(--font-d);
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .pp-collections {
            padding: 0 16px 20px;
        }
        .pp-collections-t {
            font-family: var(--font-d);
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .collection-mini-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .collection-mini-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .collection-mini-card:hover {
            transform: translateY(-3px);
        }
        .collection-mini-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .collection-mini-card .info {
            padding: 6px 8px;
        }
        .collection-mini-card .info .name {
            font-family: var(--font-d);
            font-weight: 600;
            font-size: 13px;
        }
        .collection-mini-card .info .count {
            font-size: 10px;
            color: var(--text3);
        }

        /* ==================== 首页 ==================== */
        .page-home {
            padding: 16px;
        }
        .hot-rank {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 20px;
        }
        .hot-rank-title {
            font-family: var(--font-d);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hot-rank-title .badge {
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
        }
        .hot-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .hot-item:last-child {
            border-bottom: none;
        }
        .hot-item .rank-num {
            font-family: var(--font-d);
            font-size: 18px;
            font-weight: 800;
            color: var(--text3);
            width: 30px;
            text-align: center;
        }
        .hot-item .rank-num.gold {
            color: #ffb800;
        }
        .hot-item .rank-num.silver {
            color: #c0c0c0;
        }
        .hot-item .rank-num.bronze {
            color: #cd7f32;
        }
        .hot-item img {
            width: 64px;
            height: 36px;
            object-fit: cover;
            border-radius: 6px;
        }
        .hot-item .info {
            flex: 1;
        }
        .hot-item .info .title {
            font-size: 13px;
            font-weight: 600;
        }
        .hot-item .info .views {
            font-size: 10px;
            color: var(--text3);
        }

        /* 分类标签 + 汉堡菜单 */
        .cat-tabs-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: nowrap;
        }
        .cat-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            flex: 1;
            padding: 0;
        }
        .cat-tabs::-webkit-scrollbar {
            display: none;
        }
        .cat-tab {
            flex-shrink: 0;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: var(--surface);
            color: var(--text2);
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: var(--shadow);
        }
        .cat-tab:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        .cat-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .cat-hamburger {
            flex-shrink: 0;
            padding: 4px 10px;
            font-size: 20px;
            cursor: pointer;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            line-height: 1;
            display: none;
        }
        .cat-hamburger.show {
            display: block;
        }
        .cat-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            padding: 8px 0;
            z-index: 50;
            min-width: 120px;
            display: none;
        }
        .cat-dropdown.show {
            display: block;
        }
        .cat-dropdown .cat-tab {
            display: block;
            border: none;
            border-radius: 0;
            box-shadow: none;
            padding: 6px 16px;
            width: 100%;
            text-align: left;
            background: transparent;
        }
        .cat-dropdown .cat-tab:hover {
            background: var(--surface-hover);
        }
        .cat-dropdown .cat-tab.active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .v-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .v-card {
            cursor: pointer;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--surface);
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .v-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        .v-card:hover .v-card-img img {
            transform: scale(1.04);
        }
        .v-card-img {
            position: relative;
            aspect-ratio: 16 / 9;
            background: var(--surface-hover);
            overflow: hidden;
        }
        .v-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .v-card-dur {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
        }
        .v-card-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
            backdrop-filter: blur(4px);
        }
        .v-card:hover .v-card-play {
            transform: translate(-50%, -50%) scale(1);
        }
        .v-card-paid {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4757;
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            z-index: 2;
        }
        .v-card-collab {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ffb800;
            color: #ffffff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            z-index: 2;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
        }

                    { q: '合作标签是什么？', a: '视频如有合作创作者，会在封面显示"合作"标签，并在播放页展示合作者信息。' },

                    { q: '个人主页有什么用？', a: '展示您的视频、合集、粉丝数、总播放量，以及认证等级。' },
                    { q: '创作者中心入口', a: '到现在为止还是没有后台管理页面，创建创作者账号和发布视频请联系我' },
                    { q: '认证申请通道', a: '如需申请认证，请发送邮件至 2103686588n@qq.com 或联系站内管理员。' },

            },
            'faq': {
                label: '常见问题',
                icon: '❓',
                qa: [
                    { q: '页面加载很慢怎么办？', a: '请检查网络连接，或尝试刷新页面。部分视频源为外部链接，加载速度受网络影响。' },
                    { q: '如何返回上一页？', a: '在视频页或个人主页，左上角有返回按钮（←），点击即可返回。' },

                ]
            }
        };
        const HELP_CATEGORIES = Object.keys(HELP_DATA);

        // ============================================================
        // 全局状态
        // ============================================================
        let curPage = 'home';
        let curVideo = null;
        let searchQ = '';
        let player = null;
        let dmEngine = null;
        let controlsTimer = null;
        let isMember = false;
        let historyStack = ['home'];
        let previewLimitReached = false;
        let currentCollection = null;
        let currentCollectionIndex = -1;
        let welcomeShown = false;

        // ============================================================
        // 工具函数
        // ============================================================
        function fmt(n) {
            if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + '万';
            return n.toLocaleString();
        }

        function getUploader(id) { return UPLOADERS.find(u => u.id === id); }

        function getVideo(id) { return VIDEOS.find(v => v.id === id); }

        function getUploaderVideos(upId) { return VIDEOS.filter(v => v.upId === upId); }

        function getCollectionsForUploader(upId) {
            const userVideoIds = getUploaderVideos(upId).map(v => v.id);
            return COLLECTIONS.filter(c => c.videoIds.some(vid => userVideoIds.includes(vid)));
        }

        function getCollectionForVideo(videoId) {
            return COLLECTIONS.find(c => c.videoIds.includes(videoId));
        }

        function getCollectionVideos(collectionId) {
            const coll = COLLECTIONS.find(c => c.id === collectionId);
            if (!coll) return [];
            return coll.videoIds.map(id => getVideo(id)).filter(Boolean);
        }

        function getVideoIndexInCollection(videoId, collection) {
            if (!collection) return -1;
            return collection.videoIds.indexOf(videoId);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2200);
        }

        let memoryHistory = [];

        function getHistory() {
            try {
                const data = localStorage.getItem('watchHistory');
                return data ? JSON.parse(data) : [];
            } catch (e) { return memoryHistory; }
        }

        function saveHistory(history) {
            try {
                localStorage.setItem('watchHistory', JSON.stringify(history));
                memoryHistory = history;
            } catch (e) { memoryHistory = history; }
        }

        function addHistory(videoId) {
            let hist = getHistory();
            hist = hist.filter(item => item.id !== videoId);
            const v = getVideo(videoId);
            if (!v) return;
            hist.unshift({ id: videoId, title: v.title, thumb: v.thumb, time: new Date().toLocaleString() });
            if (hist.length > 50) hist = hist.slice(0, 50);
            saveHistory(hist);
        }

        // ----- 路由相关 -----
        function getHashPath() {
            return window.location.hash.slice(1) || '/home';
        }

        function parseHash(hash) {
            const parts = hash.split('/');
            const page = parts[1] || 'home';
            const id = parts[2] ? parseInt(parts[2]) : undefined;
            return { page, id };
        }

        function updateHash(page, id) {
            let hash = '#/' + page;
            if (id !== undefined) hash += '/' + id;
            if (window.location.hash !== hash) {
                window.history.pushState(null, '', hash);
            }
        }

        function goBack() {
            window.history.back();
        }

        // ============================================================
        // 启动弹窗
        // ============================================================
        function showWelcomeModal() {
            if (welcomeShown) return;
            welcomeShown = true;
            const modal = document.getElementById('welcomeModal');
            setTimeout(() => {
                modal.classList.add('show');
            }, 800);
        }

        function closeWelcomeModal() {
            document.getElementById('welcomeModal').classList.remove('show');
        }

        function goToHelp() {
            closeWelcomeModal();
            navigate('help');
        }

        // ============================================================
        // 页面路由
        // ============================================================
        let isInternalNav = false;

        function navigate(page, params = {}, pushHistory = true) {
            // 清理播放器
            if (player) { player.pause();
                player = null; }
            if (dmEngine) { dmEngine.stop();
                dmEngine = null; }
            clearTimeout(controlsTimer);
            if (window._viewInterval) {
                clearInterval(window._viewInterval);
                window._viewInterval = null;
            }
            previewLimitReached = false;
            currentCollection = null;
            currentCollectionIndex = -1;

            // 更新 URL hash
            if (pushHistory) {
                let id = undefined;
                if (page === 'watch' && params.id) id = params.id;
                else if (page === 'profile' && params.id) id = params.id;
                else if (page === 'collection' && params.id) id = params.id;
                updateHash(page, id);
            }

            // 渲染页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.back-btn').forEach(el => el.remove());

            if (page === 'home') {
                curPage = 'home';
                document.getElementById('pageHome').classList.add('active');
                renderHome(params.cat || '');
                document.getElementById('btmNav').classList.remove('hidden');
            } else if (page === 'watch') {
                curPage = 'watch';
                document.getElementById('pageWatch').classList.add('active');
                renderWatch(params.id);
                document.getElementById('btmNav').classList.add('hidden');
                addBackButton();
            } else if (page === 'profile') {
                curPage = 'profile';
                document.getElementById('pageProfile').classList.add('active');
                renderProfile(params.id);
                document.getElementById('btmNav').classList.add('hidden');
                addBackButton();
            } else if (page === 'collection') {
                curPage = 'collection';
                document.getElementById('pageCollection').classList.add('active');
                renderCollection(params.id);
                if (params.id) {
                    document.getElementById('btmNav').classList.add('hidden');
                    addBackButton();
                } else {
                    document.getElementById('btmNav').classList.remove('hidden');
                }
            } else if (page === 'help') {
                curPage = 'help';
                document.getElementById('pageHelp').classList.add('active');
                renderHelp(params.cat || HELP_CATEGORIES[0]);
                document.getElementById('btmNav').classList.add('hidden');
                addBackButton();
            } else if (page === 'settings') {
                curPage = 'settings';
                document.getElementById('pageSettings').classList.add('active');
                renderSettings();
                document.getElementById('btmNav').classList.remove('hidden');
            }

            // 底部导航高亮（仅当显示时）
            if (!document.getElementById('btmNav').classList.contains('hidden')) {
                document.querySelectorAll('.bni').forEach(b => b.classList.remove('active'));
                const map = { 'home': 'home', 'collection': 'collection', 'settings': 'settings' };
                const target = map[page] || 'home';
                document.querySelector(`.bni[data-page="${target}"]`)?.classList.add('active');
            }

            window.scrollTo(0, 0);
        }

        function addBackButton() {
            const existing = document.querySelector('.back-btn');
            if (existing) existing.remove();
            const btn = document.createElement('div');
            btn.className = 'back-btn';
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>`;
            btn.onclick = goBack;
            document.body.appendChild(btn);
        }

        // ----- 监听 hash 变化 -----
        function onHashChange() {
            if (isInternalNav) {
                isInternalNav = false;
                return;
            }
            const hash = window.location.hash;
            const { page, id } = parseHash(hash);
            if (page === 'home') {
                navigate('home', {}, false);
            } else if (page === 'watch' && id !== undefined) {
                navigate('watch', { id: id }, false);
            } else if (page === 'profile' && id !== undefined) {
                navigate('profile', { id: id }, false);
            } else if (page === 'collection') {
                navigate('collection', { id: id }, false);
            } else if (page === 'help') {
                navigate('help', {}, false);
            } else if (page === 'settings') {
                navigate('settings', {}, false);
            } else {
                navigate('home', {}, false);
            }
        }

        window.addEventListener('popstate', onHashChange);
        window.addEventListener('hashchange', onHashChange);

        // ============================================================
        // 首页渲染
        // ============================================================
        function renderHome(activeCat) {
            const allCats = ['全部', '🔥 热门', '🎬 动画', '🎮 游戏', '📚 书籍', '💻 科技'];
            const currentCat = activeCat || '全部';

            let filtered = VIDEOS;
            if (activeCat && activeCat !== '全部') {
                if (activeCat === '🔥 热门') {
                    filtered = [...VIDEOS].sort((a, b) => b.views - a.views);
                } else {
                    filtered = VIDEOS.filter(v => v.cat === activeCat);
                }
            }
            if (searchQ) {
                const q = searchQ.toLowerCase();
                filtered = VIDEOS.filter(v =>
                    v.title.toLowerCase().includes(q) ||
                    getUploader(v.upId).name.toLowerCase().includes(q)
                );
            }

            const top3 = [...VIDEOS].sort((a, b) => b.views - a.views).slice(0, 3);

            let html = '';
            if (top3.length) {
                html += `<div class="hot-rank">
                    <div class="hot-rank-title">
                        🔥 热门榜 <span class="badge">第1届</span>
                    </div>`;
                top3.forEach((v, idx) => {
                    const u = getUploader(v.upId);
                    const rankClass = idx === 0 ? 'gold' : (idx === 1 ? 'silver' : 'bronze');
                    html += `
                        <div class="hot-item" onclick="navigate('watch',{id:${v.id}})">
                            <div class="rank-num ${rankClass}">${idx + 1}</div>
                            <img src="${v.thumb}" alt="">
                            <div class="info">
                                <div class="title">${v.title}</div>
                                <div class="views">${fmt(v.views)}次观看 · ${u.name}</div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            html += `<div class="cat-tabs-wrapper" style="position:relative;">
                        <div class="cat-tabs" id="catTabs">`;
            allCats.forEach(c => {
                const isActive = currentCat === c ? 'active' : '';
                html += `<div class="cat-tab ${isActive}" data-cat="${c}" onclick="navigate('home',{cat:'${c}'})">${c}</div>`;
            });
            html += `</div>
                        <div class="cat-hamburger" id="catHamburger" onclick="toggleCatDropdown()">☰</div>
                        <div class="cat-dropdown" id="catDropdown"></div>
                    </div>`;

            const title = searchQ ? '搜索: ' + searchQ : (activeCat || '推荐视频');
            html += `<div style="font-family:var(--font-d);font-size:18px;font-weight:800;margin-bottom:14px">${title}</div>`;

            if (filtered.length === 0) {
                html += '<div style="text-align:center;padding:60px 0;color:var(--text3)">没有找到相关视频</div>';
            } else {
                html += '<div class="v-grid">';
                filtered.forEach(v => { html += videoCardHTML(v); });
                html += '</div>';
            }

            document.getElementById('pageHome').innerHTML = html;

            const tabs = document.getElementById('catTabs');
            const hamburger = document.getElementById('catHamburger');
            if (tabs && hamburger) {
                const wrapper = tabs.parentElement;
                if (tabs.scrollWidth > wrapper.offsetWidth - 50) {
                    hamburger.classList.add('show');
                } else {
                    hamburger.classList.remove('show');
                }
                const dropdown = document.getElementById('catDropdown');
                if (dropdown) {
                    dropdown.innerHTML = '';
                    allCats.forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'cat-tab' + (currentCat === c ? ' active' : '');
                        div.textContent = c;
                        div.onclick = function() {
                            navigate('home', { cat: c });
                            document.getElementById('catDropdown').classList.remove('show');
                        };
                        dropdown.appendChild(div);
                    });
                }
                document.addEventListener('click', function closeDropdown(e) {
                    const wrapper = document.querySelector('.cat-tabs-wrapper');
                    if (wrapper && !wrapper.contains(e.target)) {
                        const dd = document.getElementById('catDropdown');
                        if (dd) dd.classList.remove('show');
                    }
                });
            }
        }

        function toggleCatDropdown() {
            const dd = document.getElementById('catDropdown');
            if (dd) dd.classList.toggle('show');
        }

        // ---------- 视频卡片 ----------
        function videoCardHTML(v) {
            const u = getUploader(v.upId);
            const paidBadge = v.paid ? `<div class="v-card-paid">会员专享</div>` : '';
            const collabBadge = (v.collaborators && v.collaborators.length > 0) ?
                `<div class="v-card-collab">合作</div>` : '';
            const finalBadge = paidBadge || collabBadge;
            return `
                <div class="v-card" onclick="navigate('watch',{id:${v.id}})">
                  <div class="v-card-img">
                    <img src="${v.thumb}" alt="${v.title}" loading="lazy"
                         onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22640%22 height=%22360%22%3E%3Crect width=%22640%22 height=%22360%22 fill=%22%23333%22/%3E%3Ctext x=%22320%22 y=%22180%22 font-size=%2220%22 fill=%22%23aaa%22 text-anchor=%22middle%22 dominant-baseline=%22central%22%3E暂无封面%3C/text%3E%3C/svg%3E';">
                    <div class="v-card-dur">${v.duration}</div>
                    <div class="v-card-play">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                        <polygon points="5 3 19 12 5 21"/>
                      </svg>
                    </div>
                    ${finalBadge}
                  </div>
                  <div class="v-card-info">
                    <div class="v-card-av-wrap">
                      <img src="${u.avatar}" alt="" class="v-card-av"
                           onclick="event.stopPropagation();navigate('profile',{id:${u.id}})">
                    </div>
                    <div class="v-card-meta">
                      <div class="v-card-title">${v.title}</div>
                      <div class="v-card-author">${u.name}</div>
                      <div class="v-card-stats">${fmt(v.views)}次观看 · ${v.date}</div>
                    </div>
                  </div>
                </div>
              `;
        }

        // ============================================================
        // 播放页渲染 —— 核心修改：免费视频（paid:false）不受合集VIP限制
        // ============================================================
        function renderWatch(vid) {
            try {
                const v = getVideo(vid);
                if (!v) {
                    showToast('视频不存在，返回首页');
                    navigate('home');
                    return;
                }

                const collection = getCollectionForVideo(v.id);
                currentCollection = collection || null;
                if (collection) {
                    currentCollectionIndex = collection.videoIds.indexOf(v.id);
                } else {
                    currentCollectionIndex = -1;
                }

                // ----- 关键修改：判断视频是否免费，若免费则无视合集VIP -----
                let isVipCollection = false;
                let previewDuration = 0;

                if (v.paid === true) {
                    // 视频需要会员
                    if (collection && collection.isVip) {
                        // 合集是VIP，使用合集的试看设置（可能为0）
                        isVipCollection = true;
                        previewDuration = collection.freePreviewDuration || 0;
                    } else {
                        // 合集非VIP但视频本身付费，仍视为会员内容（无试看）
                        isVipCollection = true;
                        previewDuration = 0;
                    }
                } else {
                    // v.paid === false，视频免费，完全不受合集VIP影响
                    isVipCollection = false;
                    previewDuration = 0;
                }

                // 如果视频付费且无任何试看时长，且用户非会员，则跳转开通会员
                if (isVipCollection && !isMember && previewDuration === 0) {
                    showToast('该视频为VIP内容，请开通会员');
                    navigate('settings');
                    return;
                }

                curVideo = v;
                const u = getUploader(v.upId);
                const uploader = u || { id: 0, name: '未知UP主', avatar: 'https://i.pravatar.cc/150?u=unknown', followers: 0 };

                addHistory(vid);

                let collabHtml = '';
                if (v.collaborators && v.collaborators.length) {
                    const items = v.collaborators.map(c => {
                        const cu = getUploader(c.id);
                        if (!cu) return null;
                        return `<div class="wi-collab-item" onclick="navigate('profile',{id:${cu.id}})">
                            <img src="${cu.avatar}" alt="${cu.name}">
                            <div class="info">
                                <span class="name">${cu.name}</span>
                                <span class="role">${c.role || '合作'}</span>
                            </div>
                        </div>`;
                    }).filter(Boolean);
                    if (items.length) {
                        collabHtml = `
                            <div class="wi-collab">
                                <div class="wi-collab-title">🤝 协作创作</div>
                                <div class="wi-collab-grid">${items.join('')}</div>
                            </div>
                        `;
                    }
                }

                let recommendVideos = [];
                const others = VIDEOS.filter(item => item.id !== v.id);
                const topViews = [...others].sort((a, b) => b.views - a.views).slice(0, 2);
                const sameCat = others.filter(item => item.cat === v.cat && !topViews.includes(item));
                const selected = [...topViews];
                const need = 6;
                for (let i = 0; i < Math.min(need, sameCat.length); i++) {
                    selected.push(sameCat[i]);
                }
                if (selected.length < 8) {
                    const rest = others.filter(item => !selected.includes(item));
                    for (let i = 0; i < Math.min(8 - selected.length, rest.length); i++) {
                        selected.push(rest[i]);
                    }
                }
                recommendVideos = selected.slice(0, 8);

                let recHtml = '';
                if (recommendVideos.length) {
                    recHtml = `
                        <div class="wi-recommend">
                            <div class="wi-recommend-title">📺 推荐视频</div>
                            <div class="wi-recommend-grid">
                                ${recommendVideos.map(rv => `
                                    <div class="wi-recommend-item" onclick="navigate('watch',{id:${rv.id}})">
                                        <img src="${rv.thumb}" alt="${rv.title}" loading="lazy">
                                        <div class="info">
                                            <div class="title">${rv.title}</div>
                                            <div class="views">${fmt(rv.views)}次观看</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                let menuHtml = '';
                let menuBtnHtml = '';
                if (collection) {
                    const collVideos = collection.videoIds.map(id => getVideo(id)).filter(Boolean);
                    menuBtnHtml = `
                        <div class="collection-menu-btn show" id="collectionMenuBtn" onclick="toggleCollectionMenu()">
                            📂 合集
                        </div>
                        <div class="collection-menu-panel" id="collectionMenuPanel">
                            ${collVideos.map((cv, idx) => `
                                <div class="item ${cv.id === v.id ? 'active' : ''}" onclick="navigate('watch',{id:${cv.id}})">
                                    <span class="index">${idx+1}</span>
                                    <span class="title">${cv.title}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                const paidBadge = (v.paid || isVipCollection) ? `<span class="wi-paid-badge">会员专享</span>` : '';
                let previewLabel = '';
                if (isVipCollection && !isMember && previewDuration > 0) {
                    previewLabel = `试看 ${previewDuration} 秒`;
                }

                // ---- 徽章渲染 ----
                let badgeHtml = '';
                if (uploader.verify && VERIFY_LABELS[uploader.verify] && VERIFY_LABELS[uploader.verify] !== '') {
                    const verifyClass = uploader.verify;
                    const verifyLabel = VERIFY_LABELS[verifyClass];
                    badgeHtml = `<span class="verify-badge ${verifyClass}">${verifyLabel}</span>`;
                }

                const html = `
                    <div class="wp-wrap" id="playerWrap">
                      <video id="vidEl" preload="metadata" src="${v.video}" playsinline webkit-playsinline></video>
                      <div class="video-error-overlay" id="videoErrorOverlay">
                        <span>⚠️ 视频加载失败</span>
                        <button class="retry-btn" onclick="retryVideo()">🔄 重新加载</button>
                      </div>
                      <div class="preview-overlay" id="previewOverlay">${previewLabel}</div>
                      <div class="ended-recommend" id="endedRecommend">
                        <div class="title">📺 您可能还喜欢</div>
                        <div class="grid" id="endedRecommendGrid"></div>
                      </div>
                      ${menuBtnHtml}
                      ${menuHtml}
                      <div class="dm-box" id="dmBox"></div>
                      <div class="pc-center" id="centerPlay" onclick="togglePlay()">
                        <svg viewBox="0 0 24 24" fill="white">
                          <polygon points="5 3 19 12 5 21"/>
                        </svg>
                      </div>
                      <div class="dm-bar" id="dmBar">
                        <input type="text" id="dmInput" placeholder="发送弹幕..." maxlength="50"
                               onkeydown="if(event.key==='Enter')sendDanmaku()">
                        <button onclick="sendDanmaku()">发送</button>
                      </div>
                      <div class="pc show" id="playerCtrl">
                        <div class="pc-prog" id="progBar">
                          <div class="pc-prog-buf" id="progBuf"></div>
                          <div class="pc-prog-play" id="progPlay"></div>
                          <div class="pc-prog-handle" id="progHandle"></div>
                        </div>
                        <div class="pc-btns">
                          <button class="pc-btn" id="btnPlay" onclick="togglePlay()">
                            <svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21"/></svg>
                          </button>
                          <span class="pc-time" id="timeDisp">0:00 / 0:00</span>
                          <div class="pc-spacer"></div>
                          <div class="pc-vol">
                            <button class="pc-btn" id="btnVol" onclick="toggleMute()">

        // ============================================================
        // 播放器控制
        // ============================================================
        let currentVideoId = null;
        let isVipCollection = false;
        let previewDuration = 0;
        let previewReached = false;

        function initPlayer(vid, isVip, previewSec) {
            currentVideoId = vid;
            isVipCollection = isVip;
            previewDuration = previewSec;
            previewReached = false;

            const vidEl = document.getElementById('vidEl');
            if (!vidEl) return;
            const wrap = document.getElementById('playerWrap');
            const ctrl = document.getElementById('playerCtrl');
            const centerPlay = document.getElementById('centerPlay');
            const progBar = document.getElementById('progBar');
            const progPlay = document.getElementById('progPlay');
            const progBuf = document.getElementById('progBuf');
            const progHandle = document.getElementById('progHandle');
            const timeDisp = document.getElementById('timeDisp');
            const btnPlay = document.getElementById('btnPlay');
            const errorOverlay = document.getElementById('videoErrorOverlay');
            const previewOverlay = document.getElementById('previewOverlay');
            const endedRecommend = document.getElementById('endedRecommend');
            let seeking = false;

            if (previewOverlay) {
                if (isVipCollection && !isMember && previewDuration > 0) {
                    previewOverlay.textContent = `试看 ${previewDuration} 秒`;
                    previewOverlay.classList.add('show');
                } else {
                    previewOverlay.classList.remove('show');
                }
            }

            let endedHandler = function() {
                updatePlayBtn();
                if (dmEngine) dmEngine.pause();

                const coll = currentCollection;
                if (coll && currentCollectionIndex !== -1 && currentCollectionIndex < coll.videoIds.length - 1) {
                    const nextId = coll.videoIds[currentCollectionIndex + 1];
                    setTimeout(() => {
                        navigate('watch', { id: nextId });
                    }, 1500);
                    return;
                }

                showEndedRecommend();
            };

            function showEndedRecommend() {
                if (!endedRecommend) return;
                const others = VIDEOS.filter(item => item.id !== currentVideoId);
                const topViews = [...others].sort((a, b) => b.views - a.views).slice(0, 2);
                const sameCat = others.filter(item => item.cat === curVideo.cat && !topViews.includes(item));
                const selected = [...topViews];
                const need = 6;
                for (let i = 0; i < Math.min(need, sameCat.length); i++) {
                    selected.push(sameCat[i]);
                }
                if (selected.length < 6) {
                    const rest = others.filter(item => !selected.includes(item));
                    for (let i = 0; i < Math.min(6 - selected.length, rest.length); i++) {
                        selected.push(rest[i]);
                    }
                }
                const recVideos = selected.slice(0, 6);

                const grid = document.getElementById('endedRecommendGrid');
                if (grid) {
                    grid.innerHTML = recVideos.map(rv => `
                        <div class="item" onclick="navigate('watch',{id:${rv.id}})">
                            <img src="${rv.thumb}" alt="${rv.title}" loading="lazy">
                            <div class="info">
                                <div class="title">${rv.title}</div>
                                <div class="views">${fmt(rv.views)}次观看</div>
                            </div>
                        </div>
                    `).join('');
                }
                endedRecommend.classList.add('show');
            }

            function hideEndedRecommend() {
                if (endedRecommend) endedRecommend.classList.remove('show');
            }

            wrap.addEventListener('click', function(e) {
                if (e.target.closest('.ended-recommend')) return;
                hideEndedRecommend();
            });

            vidEl.addEventListener('error', () => {
                errorOverlay.classList.add('show');
                showToast('视频加载失败，请点击重试按钮');
            });
            vidEl.addEventListener('canplay', () => errorOverlay.classList.remove('show'));
            if (vidEl.readyState >= 3) errorOverlay.classList.remove('show');

            function formatTime(s) {
                if (isNaN(s)) return '0:00';
                const m = Math.floor(s / 60);
                const sec = Math.floor(s % 60);
                return m + ':' + String(sec).padStart(2, '0');
            }

            function updateUI() {
                if (!vidEl.duration) return;
                if (isVipCollection && !isMember && previewDuration > 0) {
                    const currentTime = vidEl.currentTime;
                    if (currentTime >= previewDuration && !vidEl.paused && !previewReached) {
                        previewReached = true;
                        vidEl.pause();
                        showToast(`试看结束，开通会员观看完整内容`);
                        if (previewOverlay) {
                            previewOverlay.textContent = '试看已结束';
                            previewOverlay.classList.add('show');
                        }
                        vidEl.currentTime = previewDuration;
                        updateUI();
                        return;
                    }
                }

                const pct = (vidEl.currentTime / vidEl.duration) * 100;
                progPlay.style.width = pct + '%';
                progHandle.style.left = pct + '%';
                timeDisp.textContent = formatTime(vidEl.currentTime) + ' / ' + formatTime(vidEl.duration);
                if (vidEl.buffered.length > 0) {
                    const bufPct = vidEl.buffered.end(vidEl.buffered.length - 1) / vidEl.duration * 100;
                    progBuf.style.width = bufPct + '%';
                }
            }

            function updatePlayBtn() {
                if (vidEl.paused) {
                    btnPlay.innerHTML = '<svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21"/></svg>';
                    centerPlay.classList.remove('hidden');
                } else {
                    btnPlay.innerHTML = '<svg viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
                    centerPlay.classList.add('hidden');
                }
            }

            vidEl.addEventListener('timeupdate', updateUI);
            vidEl.addEventListener('loadedmetadata', updateUI);
            vidEl.addEventListener('play', updatePlayBtn);
            vidEl.addEventListener('pause', updatePlayBtn);
            vidEl.addEventListener('ended', endedHandler);

            function seekTo(e) {
                const rect = progBar.getBoundingClientRect();
                let pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                let targetTime = pct * vidEl.duration;
                if (isVipCollection && !isMember && previewDuration > 0 && targetTime > previewDuration) {
                    targetTime = previewDuration;
                    pct = previewDuration / vidEl.duration;
                    showToast('试看模式，无法继续播放');
                }
                vidEl.currentTime = targetTime;
                updateUI();
            }

            progBar.addEventListener('mousedown', (e) => { seeking = true;
                seekTo(e); });
            document.addEventListener('mousemove', (e) => { if (seeking) seekTo(e); });
            document.addEventListener('mouseup', () => { seeking = false; });
            progBar.addEventListener('touchstart', (e) => {
                seeking = true;
                const touch = e.touches[0];
                const rect = progBar.getBoundingClientRect();
                let pct = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
                let targetTime = pct * vidEl.duration;
                if (isVipCollection && !isMember && previewDuration > 0 && targetTime > previewDuration) {
                    targetTime = previewDuration;
                    pct = previewDuration / vidEl.duration;
                    showToast('试看模式，无法继续播放');
                }
                vidEl.currentTime = targetTime;
                updateUI();
            }, { passive: true });
            progBar.addEventListener('touchmove', (e) => {
                if (!seeking) return;
                const touch = e.touches[0];
                const rect = progBar.getBoundingClientRect();
                let pct = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
                let targetTime = pct * vidEl.duration;
                if (isVipCollection && !isMember && previewDuration > 0 && targetTime > previewDuration) {
                    targetTime = previewDuration;
                    pct = previewDuration / vidEl.duration;
                    showToast('试看模式，无法继续播放');
                }
                vidEl.currentTime = targetTime;
                updateUI();
            }, { passive: true });
            document.addEventListener('touchend', () => { seeking = false; });

            function showControls() {
                ctrl.classList.add('show');
                document.getElementById('dmBar').classList.add('show');
                clearTimeout(controlsTimer);
                if (!vidEl.paused) {
                    controlsTimer = setTimeout(() => {
                        ctrl.classList.remove('show');
                        document.getElementById('dmBar').classList.remove('show');
                    }, 3000);
                }
            }
            wrap.addEventListener('mousemove', showControls);
            wrap.addEventListener('touchstart', showControls, { passive: true });
            wrap.addEventListener('click', (e) => {
                if (e.target.closest('.pc-btn') || e.target.closest('.pc-prog') ||
                    e.target.closest('.dm-bar') || e.target.closest('.pc-vol') ||
                    e.target.closest('.pc-center') || e.target.closest('.video-error-overlay') ||
                    e.target.closest('.collection-menu-btn') || e.target.closest('.collection-menu-panel')) return;
                togglePlay();
            });

            vidEl.playbackRate = speedOptions[speedIndex];
            const speedBtn = document.getElementById('speedBtn');
            if (speedBtn) speedBtn.textContent = speedOptions[speedIndex].toFixed(1) + 'x';

            player = vidEl;
            updatePlayBtn();
            showControls();
        }

        function toggleCollectionMenu() {
            const panel = document.getElementById('collectionMenuPanel');
            if (panel) panel.classList.toggle('show');
        }

        document.addEventListener('click', function(e) {
            const btn = document.getElementById('collectionMenuBtn');
            const panel = document.getElementById('collectionMenuPanel');
            if (btn && panel && !btn.contains(e.target) && !panel.contains(e.target)) {
                panel.classList.remove('show');
            }
        });

        function retryVideo() {
            if (!player) return;
            const errorOverlay = document.getElementById('videoErrorOverlay');
            errorOverlay.classList.remove('show');
            const src = player.src;
            player.src = '';
            player.load();
            player.src = src;
            player.load();
            player.play().catch(() => {});
            showToast('正在重新加载...');
        }
        window.retryVideo = retryVideo;

        function togglePlay() {
            if (!player) return;
            if (isVipCollection && !isMember && previewDuration > 0 && previewReached) {
                showToast('试看已结束，请开通会员');
                return;
            }
            if (player.paused) {
                player.play().catch(() => showToast('视频播放失败，请尝试重试'));
                if (dmEngine) dmEngine.resume();
            } else {
                player.pause();
                if (dmEngine) dmEngine.pause();
            }
        }

        function toggleMute() {
            if (!player) return;
            player.muted = !player.muted;
            document.getElementById('volSlider').value = player.muted ? 0 : player.volume;
            const btn = document.getElementById('btnVol');
            if (player.muted) {
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19" fill="white"/>
                  <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
                </svg>`;
            } else {
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19" fill="white"/>
                  <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.08"/>
                </svg>`;
            }
        }

        function setVolume(val) {
            if (!player) return;
            player.volume = val;
            player.muted = (val == 0);
        }

        function toggleFullscreen() {
            const wrap = document.getElementById('playerWrap');
            if (!document.fullscreenElement) {
                (wrap.requestFullscreen || wrap.webkitRequestFullscreen || wrap.msRequestFullscreen).call(wrap);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
            }
        }

        const speedOptions = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
        let speedIndex = 2;

        function cycleSpeed() {
            speedIndex = (speedIndex + 1) % speedOptions.length;
            const speed = speedOptions[speedIndex];
            if (player) {
                player.playbackRate = speed;
            }
            const btn = document.getElementById('speedBtn');
            if (btn) btn.textContent = speed.toFixed(1) + 'x';
            showToast('倍速: ' + speed.toFixed(1) + 'x');
        }

        function renderHelp(activeCategory) {

            let navHtml = '';
            HELP_CATEGORIES.forEach(key => {
                const item = HELP_DATA[key];
                const isActive = key === activeCategory ? 'active' : '';
                navHtml +=
                    `<div class="nav-item ${isActive}" onclick="switchHelpCategory('${key}')">${item.icon} ${item.label}</div>`;
            });

            let contentHtml = '';
            HELP_CATEGORIES.forEach(key => {

                const isActive = key === activeCategory ? 'active' : '';
                let qaHtml = item.qa.map(q => `

                    </div>
                `;

            const html = `

                <div class="help-nav">${navHtml}</div>
                <div class="help-content">${contentHtml}</div>
            `;

            document.getElementById('pageHelp').innerHTML = html;

            document.querySelectorAll('.help-nav .nav-item').forEach(el => {
                el.classList.toggle('active', el.textContent.includes(HELP_DATA[category].label));

            document.querySelectorAll('.help-content .section').forEach(el => {
                el.classList.toggle('active', el.dataset.category === category);
            });
