<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>七七视频网</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />

    <style>
        /* ==================== 全局设计 ==================== */
        :root {
            --bg: #f0f2f8;
            --surface: #ffffff;
            --surface-hover: #f5f7fc;
            --surface-el: #ffffff;
            --accent: #ffb800;
            --accent-dim: rgba(255, 184, 0, 0.15);
            --accent-glow: rgba(255, 184, 0, 0.3);
            --text: #1e1e2a;
            --text2: #4a4d66;
            --text3: #8a8da8;
            --border: rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
            --header-h: 56px;
            --bottom-h: 60px;
            --sidebar-w: 200px;
            --radius: 10px;
            --radius-lg: 14px;
            --font-d: 'Syne', sans-serif;
            --font-m: 'DM Mono', monospace;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: var(--font-m);
            font-size: 13px;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            padding-bottom: var(--bottom-h);
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
        }
        img {
            display: block;
            max-width: 100%;
        }
        input,
        textarea,
        select {
            font-family: inherit;
            font-size: inherit;
            color: inherit;
        }
        ::selection {
            background: var(--accent);
            color: #fff;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text3);
            border-radius: 3px;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 9999;
        }

        /* ==================== 启动页 ==================== */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.6s ease;
            font-family: var(--font-d);
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #splash .logo {
            font-size: 36px;
            font-weight: 800;
            color: #1e1e2a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #splash .logo .dot {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
        }
        #splash .loader {
            margin-top: 24px;
            width: 40px;
            height: 40px;
            border: 4px solid #e8eaef;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ==================== 启动弹窗 ==================== */
        .welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .welcome-modal.show {
            opacity: 1;
            pointer-events: all;
        }
        .welcome-modal .box {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 32px 28px 28px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
            transform: scale(0.95) translateY(20px);
            transition: transform 0.3s ease;
        }
        .welcome-modal.show .box {
            transform: scale(1) translateY(0);
        }
        .welcome-modal .box .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .welcome-modal .box h2 {
            font-family: var(--font-d);
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .welcome-modal .box p {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .welcome-modal .box .btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .welcome-modal .box .btns button {
            padding: 10px 28px;
            border-radius: 24px;
            font-family: var(--font-d);
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .welcome-modal .box .btns .btn-primary {
            background: var(--accent);
            color: #1e1e2a;
        }
        .welcome-modal .box .btns .btn-primary:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.02);
        }
        .welcome-modal .box .btns .btn-secondary {
            background: var(--surface-hover);
            color: var(--text2);
            border: 1px solid var(--border);
        }
        .welcome-modal .box .btns .btn-secondary:hover {
            background: var(--border);
        }

        /* ==================== 顶部导航 ==================== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
            gap: 16px;
        }

        .header-logo {
            font-family: var(--font-d);
            font-size: 20px;
            font-weight: 800;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex-shrink: 0;
            color: var(--text);
        }
        .header-logo .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }

        .header-search {
            flex: 1;
            max-width: 420px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .header-search input {
            width: 100%;
            height: 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 0 14px 0 36px;
            color: var(--text);
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
            cursor: pointer;
            pointer-events: none;
        }
        .header-search input::placeholder {
            color: var(--text3);
        }
        .header-search .si {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
            width: 15px;
            height: 15px;
            pointer-events: none;
        }
        .header-search {
            cursor: pointer;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .header-actions .publish-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            border-radius: 18px;
            background: var(--accent);
            color: #1e1e2a;
            font-family: var(--font-d);
            font-weight: 700;
            font-size: 12px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            white-space: nowrap;
        }
        .header-actions .publish-btn:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.04);
        }
        .header-actions .publish-btn svg {
            width: 16px;
            height: 16px;
        }
        @media (max-width: 480px) {
            .header-actions .publish-btn span {
                display: none;
            }
            .header-actions .publish-btn {
                padding: 6px 10px;
            }
        }

        /* ==================== PC 侧边栏 ==================== */
        .sidebar {
            position: fixed;
            top: var(--header-h);
            left: 0;
            bottom: 0;
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 12px 0;
            overflow-y: auto;
            z-index: 900;
            display: none;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.04);
        }
        @media (min-width: 1024px) {
            .sidebar {
                display: block;
            }
            body {
                padding-bottom: 0;
            }
        }
        .sb-sec {
            padding: 0 8px;
            margin-bottom: 20px;
        }
        .sb-title {
            font-family: var(--font-d);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text3);
            padding: 0 10px;
            margin-bottom: 6px;
        }
        .sb-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: var(--radius);
            font-size: 12px;
            color: var(--text2);
            transition: all 0.15s;
            cursor: pointer;
        }
        .sb-item:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        .sb-item.active {
            background: var(--accent-dim);
            color: var(--accent);
        }
        .sb-item svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
        }

        /* ==================== 底部导航 (移动端) ==================== */
        .btm-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--bottom-h);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
            display: none;
        }
        @media (max-width: 1023px) {
            .btm-nav {
                display: flex;
            }
        }
        .btm-nav.hidden {
            display: none;
        }
        .bni {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            color: var(--text3);
            transition: color 0.2s;
            padding: 4px 12px;
            cursor: pointer;
        }
        .bni.active {
            color: var(--accent);
        }
        .bni svg {
            width: 22px;
            height: 22px;
        }

        /* ==================== 主内容 ==================== */
        .main {
            margin-top: var(--header-h);
            min-height: calc(100vh - var(--header-h) - var(--bottom-h));
        }
        .page {
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           搜索页面
           ============================================================ */
        .page-search {
            padding: 16px;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }

        .search-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: var(--text2);
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .search-back-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        .search-back-btn svg {
            width: 16px;
            height: 16px;
        }

        .search-header {
            margin-bottom: 20px;
        }
        .search-header .keyword {
            font-family: var(--font-d);
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-header .keyword .count {
            font-size: 14px;
            font-weight: 400;
            color: var(--text2);
            font-family: var(--font-m);
        }
        .search-header .sub {
            font-size: 13px;
            color: var(--text2);
            margin-top: 2px;
        }

        .search-input-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .search-input-wrap input {
            flex: 1;
            height: 40px;
            padding: 0 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            box-shadow: var(--shadow);
        }
        .search-input-wrap input:focus {
            border-color: var(--accent);
        }
        .search-input-wrap button {
            padding: 0 20px;
            border-radius: 20px;
            background: var(--accent);
            color: #1e1e2a;
            font-weight: 700;
            font-size: 13px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-input-wrap button:hover {
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .hot-tags-section {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 16px 18px;
            margin-bottom: 20px;
        }
        .hot-tags-title {
            font-family: var(--font-d);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hot-tags-title .badge {
            background: #ff4757;
            color: #fff;
            font-size: 10px;
            padding: 0 10px;
            border-radius: 12px;
            line-height: 20px;
        }
        .hot-tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .hot-tag-item {
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 12px;
            background: var(--bg);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .hot-tag-item:hover {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent);
        }
        .hot-tag-item .count {
            font-size: 10px;
            color: var(--text3);
            margin-left: 4px;
        }
        .hot-tag-item .rank {
            font-weight: 700;
            margin-right: 4px;
        }
        .hot-tag-item .rank.gold {
            color: #ffb800;
        }
        .hot-tag-item .rank.silver {
            color: #c0c0c0;
        }
        .hot-tag-item .rank.bronze {
            color: #cd7f32;
        }

        .all-tags-section {
            margin-bottom: 20px;
        }
        .all-tags-title {
            font-family: var(--font-d);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .all-tags-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .all-tags-scroll .tag-item {
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
            white-space: nowrap;
        }
        .all-tags-scroll .tag-item:hover {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent);
        }

        .section-title {
            font-family: var(--font-d);
            font-size: 18px;
            font-weight: 700;
            margin: 24px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .badge {
            background: var(--accent);
            color: #1e1e2a;
            font-size: 10px;
            padding: 0 10px;
            border-radius: 12px;
            line-height: 20px;
            font-weight: 700;
        }

        .creator-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .creator-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .creator-item:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        .creator-item .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            background: #e8eaef;
        }
        .creator-item .info {
            flex: 1;
            min-width: 0;
        }
        .creator-item .info .name {
            font-weight: 700;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .creator-item .info .handle {
            font-size: 12px;
            color: var(--text2);
        }
        .creator-item .info .stats {
            font-size: 11px;
            color: var(--text3);
        }
        .creator-item .arrow {
            color: var(--text3);
            font-size: 18px;
            flex-shrink: 0;
        }
        .creator-item .badge-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 0 8px;
            border-radius: 10px;
            color: #fff;
            line-height: 20px;
        }
        .badge-tag.gold {
            background: #ffb800;
        }
        .badge-tag.blue {
            background: #3b8cff;
        }
        .badge-tag.white {
            background: #b0b0b0;
        }

        .search-results-title {
            font-family: var(--font-d);
            font-size: 18px;
            font-weight: 700;
            margin: 24px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-results-title .badge {
            background: var(--accent);
            color: #1e1e2a;
            font-size: 10px;
            padding: 0 10px;
            border-radius: 12px;
            line-height: 20px;
            font-weight: 700;
        }

        .search-results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .search-result-item {
            cursor: pointer;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface);
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .search-result-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }
        .search-result-item img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #e8eaef;
        }
        .search-result-item .info {
            padding: 10px 12px 12px;
        }
        .search-result-item .info .title {
            font-family: var(--font-d);
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 2px;
        }
        .search-result-item .info .author {
            font-size: 11px;
            color: var(--text2);
        }
        .search-result-item .info .tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .search-result-item .info .tags .tag {
            font-size: 9px;
            padding: 1px 8px;
            border-radius: 10px;
            background: var(--bg);
            color: var(--text3);
        }
        .search-result-item .thumb-wrap {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #e8eaef;
        }
        .search-result-item .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .search-result-item:hover .thumb-wrap img {
            transform: scale(1.04);
        }
        .search-result-item .thumb-wrap .dur {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
            z-index: 2;
        }
        .search-result-item .thumb-wrap .paid-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4757;
            color: #fff;
            font-size: 9px;
            padding: 1px 8px;
            border-radius: 10px;
            font-weight: 700;

            color: var(--text2);
        }
        .pp-vids {

            font-weight: 700;

        }
        .collection-mini-card .info .name {
            font-family: var(--font-d);
            font-weight: 600;
            font-size: 13px;
        }
        .collection-mini-card .info .count {
            font-size: 10px;
            color: var(--text3);
        }

        /* ==================== 首页 ==================== */

        }
        .hot-rank {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 20px;
        }
        .hot-rank-title {
            font-family: var(--font-d);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hot-rank-title .badge {
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
        }
        .hot-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .hot-item:last-child {
            border-bottom: none;
        }
        .hot-item .rank-num {

            font-size: 18px;
            font-weight: 800;
            color: var(--text3);

            text-align: center;

        .hot-item .rank-num.gold {
            color: #ffb800;
        }
        .hot-item .rank-num.silver {
            color: #c0c0c0;
        }
        .hot-item .rank-num.bronze {
            color: #cd7f32;
        }
        .hot-item img {
            width: 64px;
            height: 36px;
            object-fit: cover;
            border-radius: 6px;
        }
        .hot-item .info {

        }
        .hot-item .info .title {
            font-size: 13px;
            font-weight: 600;
        }
        .hot-item .info .views {
            font-size: 10px;
            color: var(--text3);
        }

        .cat-tabs-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: nowrap;
        }
        .cat-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            flex: 1;
            padding: 0;
        }
        .cat-tabs::-webkit-scrollbar {
            display: none;
        }
        .cat-tab {
            flex-shrink: 0;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: var(--surface);
            color: var(--text2);
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: var(--shadow);
        }
        .cat-tab:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        .cat-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .cat-hamburger {
            flex-shrink: 0;
            padding: 4px 10px;
            font-size: 20px;
            cursor: pointer;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            line-height: 1;
            display: none;
        }
        .cat-hamburger.show {
            display: block;
        }
        .cat-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            padding: 8px 0;
            z-index: 50;
            min-width: 120px;
            display: none;
        }
        .cat-dropdown.show {
            display: block;
        }
        .cat-dropdown .cat-tab {
            display: block;

            border-radius: 0;
            box-shadow: none;
            padding: 6px 16px;
            width: 100%;
            text-align: left;
            background: transparent;
        }
        .cat-dropdown .cat-tab:hover {
            background: var(--surface-hover);
        }
        .cat-dropdown .cat-tab.active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        /* ============================================================
           视图切换 (新增)
           ============================================================ */
        .view-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 14px;
            padding: 4px 0;
            flex-wrap: wrap;
        }
        .view-toggle .view-label {
            font-size: 11px;
            color: var(--text3);
            margin-right: 4px;
        }
        .view-toggle .view-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text3);
            font-size: 16px;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: var(--shadow);
        }
        .view-toggle .view-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        .view-toggle .view-btn.active {
            background: var(--accent);
            color: #1e1e2a;
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .view-toggle .view-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        /* 手机端隐藏"多列"按钮 */
        @media (max-width: 767px) {
            .view-toggle .view-btn[data-view="auto"] {
                display: none;
            }
        }

        /* ============================================================
           视频网格 - 三种视图模式
           ============================================================ */
        .v-grid {
            display: grid;
            gap: 20px;
        }
        /* 视图：一行一个 */
        .view-mode-list .v-grid {
            grid-template-columns: 1fr;
        }
        /* 视图：一行两个 (手机默认) */
        .view-mode-grid .v-grid {
            grid-template-columns: repeat(2, 1fr);
        }
        /* 视图：多列自适应 (桌面默认) */
        .view-mode-auto .v-grid {
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        }
        /* 手机端一行两个时卡片宽度自适应 */
        @media (max-width: 480px) {
            .view-mode-grid .v-grid {
                gap: 12px;
            }
            .view-mode-grid .v-grid .v-card {
                min-width: 0;
            }
        }
        /* 平板/桌面多列时 */
        @media (min-width: 768px) and (max-width: 1023px) {
            .view-mode-auto .v-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 1024px) {
            .view-mode-auto .v-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (min-width: 1280px) {
            .view-mode-auto .v-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* ==================== 视频卡片 ==================== */
        .v-card {
            cursor: pointer;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--surface);
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            will-change: transform;
            contain: layout style paint;
        }
        .v-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        .v-card:hover .v-card-img img {
            transform: scale(1.04);
        }
        .v-card-img {
            position: relative;
            aspect-ratio: 16 / 9;
            background: var(--surface-hover);
            overflow: hidden;
            background-color: #e8eaef;
        }
        .v-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
            background-color: #e8eaef;
        }
        .v-card-img .img-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, #e8eaef 25%, #f0f2f8 50%, #e8eaef 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            z-index: 1;
        }
        .v-card-img .img-placeholder.loaded {
            opacity: 0;
            pointer-events: none;
            animation: none;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .v-card-dur {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
            z-index: 2;
        }
        .v-card-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
            backdrop-filter: blur(4px);
            z-index: 2;
        }
        .v-card:hover .v-card-play {
            transform: translate(-50%, -50%) scale(1);
        }
        .v-card-paid {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4757;
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            z-index: 2;
        }
        .v-card-collab {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ffb800;
            color: #ffffff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            z-index: 2;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
        }
        .v-card-tags {
            position: absolute;

            left: 6px;

            gap: 4px;
            z-index: 2;
            flex-wrap: wrap;

        .v-card-tags .tag {

            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            pointer-events: none;
        }
        .pc-prog-play {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            pointer-events: none;
        }
        .pc-prog-handle {
            position: absolute;
            top: 50%;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.15s;
            pointer-events: none;
            box-shadow: 0 0 8px var(--accent-glow);

            gap: 6px;
            flex-wrap: wrap;

        .pc-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            transition: background 0.15s;
            color: #fff;
            font-size: 12px;
            font-weight: 500;

            background: rgba(255, 255, 255, 0.15);
        }
        .pc-btn svg {
            width: 18px;
            height: 18px;
        }
        .pc-btn.on {
            color: var(--accent);
        }
        .pc-btn.speed-btn {

            padding: 0 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);

            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
        }
        .pc-vol-sl input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        .pc-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            height: 64px;

            border-radius: 50%;

            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);

            transition: transform 0.2s, background 0.2s;

        }
        .pc-center:hover {

        }
        .pc-center svg {

            height: 28px;
            color: #fff;
        }

        .dm-box {

            left: 0;
            right: 0;
            bottom: 0;

            pointer-events: none;
            z-index: 4;
        }

        .dm-bar {

            color: #fff;

        .wi {

            font-weight: 700;

        .btn-follow {

            flex-shrink: 0;

        }
        .btn-follow:hover {
            box-shadow: 0 0 14px var(--accent-glow);
        }
        .btn-follow.followed {
            background: var(--surface-hover);
            color: var(--text2);
        }

        .wi-collab {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .wi-collab-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }
        .wi-collab-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
        }
        .wi-collab-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            padding: 6px 8px;

            transition: background 0.2s;

        .wi-collab-item:hover {
            background: var(--surface-hover);
        }
        .wi-collab-item img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }
        .wi-collab-item .info {
            display: flex;
            flex-direction: column;
        }
        .wi-collab-item .info .name {
            font-weight: 600;
        }
        .wi-collab-item .info .role {
            font-size: 10px;
            color: var(--text3);
        }

        .wi-recommend {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .wi-recommend-title {
            font-family: var(--font-d);
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .wi-recommend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .wi-recommend-item {
            cursor: pointer;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface-hover);
            transition: transform 0.2s;
        }
        .wi-recommend-item:hover {
            transform: scale(1.02);
        }
        .wi-recommend-item img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .wi-recommend-item .info {
            padding: 6px 8px;
        }
        .wi-recommend-item .info .title {
            font-size: 11px;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .wi-recommend-item .info .views {
            font-size: 9px;
            color: var(--text3);
        }

        /* ==================== 合集页面 ==================== */
        .page-collection {
            padding: 16px;
        }
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .collection-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .collection-card:hover {
            transform: translateY(-4px);
        }
        .collection-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .collection-card .info {
            padding: 10px 12px;
        }
        .collection-card .info .name {
            font-family: var(--font-d);
            font-weight: 700;
            font-size: 14px;
        }
        .collection-card .info .count {
            font-size: 11px;
            color: var(--text3);
        }

        .collection-detail {
            padding: 16px;
            max-width: 900px;
            margin: 0 auto;
        }
        .collection-detail .title {
            font-family: var(--font-d);
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .collection-detail .video-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .collection-detail .video-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            padding: 8px 12px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: background 0.2s;
        }
        .collection-detail .video-item:hover {
            background: var(--surface-hover);
        }
        .collection-detail .video-item img {
            width: 80px;
            height: 45px;
            object-fit: cover;
            border-radius: 6px;
        }
        .collection-detail .video-item .info {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .collection-detail .video-item .info .left {
            display: flex;
            flex-direction: column;
        }
        .collection-detail .video-item .info .left .title {
            font-size: 13px;
            font-weight: 500;
        }
        .collection-detail .video-item .info .left .dur {
            font-size: 10px;
            color: var(--text3);
        }
        .collection-detail .video-item .info .tags {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .collection-detail .video-item .info .tags .tag {
            padding: 0 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            line-height: 20px;
            white-space: nowrap;
        }
        .tag-vip {
            background: #ff4757;
        }
        .tag-free {
            background: #2ecc71;
        }
        .tag-preview {
            background: #f39c12;
        }

        /* ==================== 使用说明页面 ==================== */
        .page-help {
            padding: 16px;
            max-width: 900px;
            margin: 0 auto;
        }
        .help-title {
            font-family: var(--font-d);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .help-sub {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 20px;
        }
        .help-nav {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
            flex-wrap: nowrap;
        }
        .help-nav::-webkit-scrollbar {
            display: none;
        }
        .help-nav .nav-item {
            flex-shrink: 0;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: var(--surface-hover);
            color: var(--text2);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .help-nav .nav-item:hover {
            background: var(--surface);
            color: var(--text);
        }
        .help-nav .nav-item.active {
            background: var(--accent);
            color: #1e1e2a;
            border-color: var(--accent);
        }
        .help-content {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 20px 24px;
            min-height: 300px;
        }
        .help-content .section {
            display: none;
        }
        .help-content .section.active {
            display: block;
        }
        .help-content .section h3 {
            font-family: var(--font-d);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .help-content .section .qa {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .help-content .section .qa:last-child {
            border-bottom: none;
        }
        .help-content .section .qa .q {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .help-content .section .qa .q .icon {
            color: var(--accent);
            font-size: 16px;
        }
        .help-content .section .qa .a {
            font-size: 13px;
            color: var(--text2);
            padding-left: 28px;
            margin-top: 4px;
            line-height: 1.7;
        }
        .help-content .section .qa .a code {
            background: var(--bg);
            padding: 0 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        .help-content .section .qa .a .link-btn {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 14px;
            background: var(--accent-dim);
            color: var(--accent);
            border-radius: 16px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }
        .help-content .section .qa .a .link-btn:hover {
            background: var(--accent);
            color: #1e1e2a;
        }

        /* ==================== 设置页面 ==================== */
        .page-settings {
            padding: 20px 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        .settings-title {
            font-family: var(--font-d);
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 24px;
        }
        .setting-group {
            margin-bottom: 28px;
            background: var(--surface);
            padding: 16px 18px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }
        .setting-group-label {
            font-family: var(--font-d);
            font-size: 13px;
            font-weight: 700;
            color: var(--text2);
            margin-bottom: 10px;
            display: block;
        }
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }
        .setting-item:last-child {
            border-bottom: none;
        }
        .setting-item-label {
            font-size: 13px;
        }
        .setting-item-desc {
            font-size: 11px;
            color: var(--text3);
            margin-top: 2px;
        }
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--text3);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .switch.on {
            background: var(--accent);
        }
        .switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .switch.on::after {
            transform: translateX(20px);
        }

        .history-list {
            margin-top: 8px;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .history-item:hover {
            background: var(--surface-hover);
        }
        .history-item img {
            width: 48px;
            height: 27px;
            object-fit: cover;
            border-radius: 4px;
        }
        .history-item-info {
            flex: 1;
        }
        .history-item-title {
            font-size: 12px;
            font-weight: 500;
        }
        .history-item-time {
            font-size: 10px;
            color: var(--text3);
        }
        .history-empty {
            text-align: center;
            color: var(--text3);
            padding: 20px 0;
        }
        .clear-history-btn {
            margin-top: 12px;
            padding: 6px 16px;
            border-radius: 16px;
            background: #ff4757;
            color: #fff;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: calc(var(--bottom-h) + 14px);
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface-el);
            color: var(--text);
            padding: 10px 20px;
            border-radius: var(--radius);
            font-size: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            z-index: 3000;
            transition: transform 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ==================== 响应式 ==================== */
        @media (min-width: 768px) {
            .page-home {
                padding: 24px;
            }
            .wi-collab-grid {
                gap: 12px 24px;
            }
            .wi-collab-item img {
                width: 40px;
                height: 40px;
            }
            .collection-mini-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
            .ended-recommend .grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .help-content {
                padding: 28px 32px;
            }
            .search-results-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
            /* 平板端：多列视图默认2列 */
            .view-mode-auto .v-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 1024px) {
            .main {
                margin-left: var(--sidebar-w);
            }
            .header {
                padding: 0 24px;
            }
            .page-home {
                padding: 24px 28px;
            }
            .toast {
                bottom: 28px;
            }
            body {
                padding-bottom: 0;
            }
            .ended-recommend .grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 700px;
            }
            .search-results-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
            /* 桌面端：多列视图3列 */
            .view-mode-auto .v-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (min-width: 1280px) {
            /* 大屏：多列视图4列 */
            .view-mode-auto .v-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        /* 手机端一行两个时调整间距 */
        @media (max-width: 480px) {
            .view-mode-grid .v-grid {
                gap: 12px;
            }
            .view-mode-grid .v-grid .v-card .v-card-title {
                font-size: 12px;
            }
            .view-mode-grid .v-grid .v-card .v-card-av {
                width: 28px;
                height: 28px;
            }
            .view-mode-grid .v-grid .v-card .v-card-info {
                padding: 8px 8px 10px;
                gap: 8px;
            }
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            display: none;
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-spinner.show {
            display: block;
        }
    </style>
</head>
