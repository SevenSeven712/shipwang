        // ============================================================
        // 弹幕引擎
        // ============================================================
        class DanmakuEngine {
            constructor(container, videoEl, messages) {
                this.container = container;
                this.video = videoEl;
                this.messages = messages || [];
                this.trackCount = 14;
                this.tracks = new Array(this.trackCount).fill(0);
                this.visible = true;
                this.running = false;
                this.paused = false;
                this.timer = null;
                this.items = [];
            }

            start() {
                this.running = true;
                this.paused = false;
                this.loop();
            }

            stop() {
                this.running = false;
                clearTimeout(this.timer);
                this.container.innerHTML = '';
                this.items = [];
            }

            pause() {
                this.paused = true;
                this.items.forEach(item => { if (item.anim) item.anim.pause(); });
            }

            resume() {
                this.paused = false;
                this.items.forEach(item => { if (item.anim) item.anim.play(); });
                this.loop();
            }

            loop() {
                if (!this.running || this.paused) return;
                if (this.video && !this.video.paused) {
                    const msg = this.messages[Math.floor(Math.random() * this.messages.length)];
                    this.send(msg);
                }
                const delay = 800 + Math.random() * 2500;
                this.timer = setTimeout(() => this.loop(), delay);
            }

            send(text, color) {
                if (!this.visible || !this.running) return;
                const el = document.createElement('div');
                el.className = 'dm-item';
                el.textContent = text;
                const colors = ['#fff', '#fff', '#fff', '#fff', '#ffe4e1', '#e0f7fa', '#fff9c4', '#f3e5f5', '#e8f5e9',
                    '#fce4ec'
                ];
                el.style.color = color || colors[Math.floor(Math.random() * colors.length)];

                const containerWidth = this.container.offsetWidth;
                const track = this.findTrack();
                const trackHeight = this.container.offsetHeight / this.trackCount;
                el.style.top = (track * trackHeight + 2) + 'px';
                el.style.left = containerWidth + 'px';
                el.style.fontSize = (14 + Math.random() * 6) + 'px';
                this.container.appendChild(el);

                const duration = 7 + Math.random() * 5;
                const endX = -(el.offsetWidth + containerWidth + 20);
                const anim = el.animate([
                    { transform: 'translateX(0)' },
                    { transform: `translateX(${endX}px)` }
                ], {
                    duration: duration * 1000,
                    easing: 'linear',
                    fill: 'forwards'
                });

                const item = { el, anim };
                this.items.push(item);
                if (this.paused) anim.pause();
                anim.onfinish = () => {
                    el.remove();
                    const idx = this.items.indexOf(item);
                    if (idx > -1) this.items.splice(idx, 1);
                };
            }

            findTrack() {
                const now = Date.now();
                let bestTrack = 0,
                    bestTime = Infinity;
                for (let i = 0; i < this.trackCount; i++) {
                    if (this.tracks[i] < now) {
                        this.tracks[i] = now + 3000 + Math.random() * 2000;
                        return i;
                    }
                    if (this.tracks[i] < bestTime) { bestTime = this.tracks[i];
                        bestTrack = i; }
                }
                this.tracks[bestTrack] = now + 4000;
                return bestTrack;
            }

            toggle() {
                this.visible = !this.visible;
                this.container.style.display = this.visible ? 'block' : 'none';
                return this.visible;
            }
        }

        // ============================================================
        // 弹幕相关函数（修复 initDanmaku is not defined）
        // ============================================================
        function initDanmaku(v) {
            const box = document.getElementById('dmBox');
            const vid = document.getElementById('vidEl');
            if (!box || !vid) return;
            dmEngine = new DanmakuEngine(box, vid, v.dm || []);
            dmEngine.start();
        }

        function toggleDanmaku() {
            if (!dmEngine) return;
            const on = dmEngine.toggle();
            document.getElementById('btnDM').classList.toggle('on', on);
            showToast(on ? '弹幕已开启' : '弹幕已关闭');
        }

        function sendDanmaku() {
            const input = document.getElementById('dmInput');
            const text = input.value.trim();
            if (!text || !dmEngine) return;
            dmEngine.send(text, '#ffb800');
            input.value = '';
            showToast('弹幕已发送');
        }

        function toggleFollow() {
            const btn = document.getElementById('followBtn');
            if (!btn) return;
            const isFollowed = btn.classList.toggle('followed');
            btn.textContent = isFollowed ? '已关注' : '关注';
            showToast(isFollowed ? '已关注' : '已取消关注');
        }

        // ============================================================
        // 设置页面
        // ============================================================
        function renderSettings() {
            try {
                const hist = getHistory();
                const html = `
                    <div class="settings-title">⚙️ 设置</div>

                    <div class="setting-group">
                        <span class="setting-group-label">帮助</span>
                        <div class="setting-item" onclick="navigate('help')" style="cursor:pointer;">
                            <div>
                                <div class="setting-item-label">📖 使用说明</div>
                                <div class="setting-item-desc">查看平台功能、会员制度与创作规则</div>
                            </div>
                            <span style="color:var(--text3);font-size:18px;">›</span>
                        </div>
                    </div>

                    <div class="setting-group">
                      <span class="setting-group-label">会员状态</span>
                      <div class="setting-item">
                        <div>
                          <div class="setting-item-label">会员身份</div>
                          <div class="setting-item-desc">${isMember ? '✅ 已开通会员' : '❌ 未开通会员'}</div>
                        </div>
                        <button onclick="toggleMembership()" style="padding:6px 16px;background:${isMember ? '#ff4757' : 'var(--accent)'};color:#fff;border-radius:16px;font-weight:700;">
                          ${isMember ? '取消会员' : '开通会员'}
                        </button>
                      </div>
                    </div>

                    <div class="setting-group">
                      <span class="setting-group-label">弹幕</span>
                      <div class="setting-item">
                        <div>
                          <div class="setting-item-label">弹幕开关</div>
                          <div class="setting-item-desc">显示/隐藏所有弹幕</div>
                        </div>
                        <div class="switch on" id="dmSwitch" onclick="toggleDanmakuSwitch()"></div>
                      </div>
                    </div>

                    <div class="setting-group">
                      <span class="setting-group-label">观看历史</span>
                      <div class="history-list" id="historyList">
                        ${hist.length === 0 ? '<div class="history-empty">暂无观看记录</div>' : ''}
                        ${hist.slice(0, 20).map(item => `
                          <div class="history-item" onclick="navigate('watch',{id:${item.id}})">
                            <img src="${item.thumb}" alt="">
                            <div class="history-item-info">
                              <div class="history-item-title">${item.title}</div>
                              <div class="history-item-time">${item.time}</div>
                            </div>
                          </div>
                        `).join('')}
                      </div>
                      ${hist.length > 0 ? `<button class="clear-history-btn" onclick="clearHistory()">清空全部历史</button>` : ''}
                    </div>
                  `;
                document.getElementById('pageSettings').innerHTML = html;

                const dmSwitch = document.getElementById('dmSwitch');
                if (dmSwitch) {
                    const dmVisible = dmEngine ? dmEngine.visible : true;
                    dmSwitch.classList.toggle('on', dmVisible);
                }
            } catch (e) {
                document.getElementById('pageSettings').innerHTML = `
                    <div class="settings-title">⚙️ 设置</div>
                    <div style="padding:20px;background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);text-align:center;color:var(--text3);">
                      <p>设置页面加载失败</p>
                      <button onclick="navigate('home')" style="margin-top:12px;padding:6px 20px;background:var(--accent);border-radius:20px;color:#fff;border:none;">返回首页</button>
                    </div>
                  `;
            }
        }

        function toggleMembership() {
            if (isMember) {
                isMember = false;
                showToast('已取消会员');
                renderSettings();
                return;
            }
            const pwd = prompt('请输入会员开通密码：');
            if (pwd === '7592') {
                isMember = true;
                showToast('✅ 会员开通成功！');
                renderSettings();
            } else if (pwd !== null) {
                showToast('❌ 密码错误，开通失败');
            }
        }

        function toggleDanmakuSwitch() {
            const sw = document.getElementById('dmSwitch');
            if (!sw) return;
            const isOn = sw.classList.toggle('on');
            if (dmEngine) {
                const visible = dmEngine.toggle();
                sw.classList.toggle('on', visible);
                showToast(visible ? '弹幕已开启' : '弹幕已关闭');
            } else {
                showToast(isOn ? '弹幕已开启' : '弹幕已关闭');
            }
        }

        function clearHistory() {
            if (confirm('确定清空所有观看历史吗？')) {
                saveHistory([]);
                renderSettings();
                showToast('已清空历史记录');
            }
        }

        // ============================================================
        // 搜索
        // ============================================================
        let searchTimer;

        function onSearch(val) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                searchQ = val.trim();
                if (curPage === 'home') {
                    renderHome('');
                } else {
                    navigate('home');
                }
            }, 300);
        }

        // ============================================================
        // 启动
        // ============================================================
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                }, 600);
            }, 1200);

            setTimeout(() => {
                showWelcomeModal();
            }, 1500);

            const hash = window.location.hash;
            if (hash) {
                onHashChange();
            } else {
                navigate('home', {}, true);
            }
        });
    </script>
